name: Build Windows x64

on:
  workflow_dispatch:
    inputs:
      windows-repo-ref:
        description: 'ungoogled-chromium-windows tag/branch'
        required: false
        default: 'master'

permissions:
  contents: read

concurrency:
  group: build-windows-x64-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 780
    defaults:
      run:
        working-directory: uw
    steps:
      - uses: actions/checkout@v6
        with:
          repository: ungoogled-software/ungoogled-chromium-windows
          ref: ${{ inputs.windows-repo-ref }}
          path: uw
          fetch-depth: 1

      - uses: actions/checkout@v6
        with:
          path: uw/ungoogled-chromium
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install httplib2==0.22.0

      - name: Patch internal timeout in build.py
        shell: pwsh
        run: |
          $content = Get-Content build.py -Raw
          # 将 3.5*60*60 (秒) 替换为 12*60*60 (秒), 即 12 小时
          # 使用字面量替换避免正则特殊字符问题
          $content = $content.Replace('3.5*60*60', '12*60*60')
          Set-Content build.py -Value $content -NoNewline

      - name: Build
        run: python build.py --ci -j 2
        timeout-minutes: 720

      - name: Package
        if: success()
        run: python package.py

      - name: Upload installer
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-installer
          path: uw/build/*_installer_*.exe

      - name: Upload portable zip
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-portable
          path: uw/build/*_windows_*.zip
